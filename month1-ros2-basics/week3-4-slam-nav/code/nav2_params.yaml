# Nav2 パラメータ設定
# カスタムロボット + カスタムハウスワールド用

# ===== Behavior Tree Navigator =====
# BT XML はデフォルト (navigate_to_pose_w_replanning_and_recovery.xml) を使用
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # plugin_lib_names: Humble デフォルトの全プラグイン
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# ===== Controller Server (Local Controller) =====
# 経路に沿いながらリアルタイム障害物回避する速度指令を生成
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0     # 制御ループ頻度 [Hz]
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5    # この範囲内で動きがなければスタック判定
      movement_time_allowance: 10.0    # スタック判定までの時間 [s]

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20         # 位置許容誤差 [m]
      yaw_goal_tolerance: 0.25        # 角度許容誤差 [rad]
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # 速度制限（カスタムロボットのスペックに合わせる）
      min_vel_x: 0.0
      max_vel_x: 0.3                  # 最大前進速度 [m/s]
      min_vel_y: 0.0
      max_vel_y: 0.0                  # 差動駆動なので横移動なし
      max_vel_theta: 1.5              # 最大回転速度 [rad/s]
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 2.0                  # 前進加速度制限
      acc_lim_y: 0.0
      acc_lim_theta: 3.0              # 回転加速度制限
      decel_lim_x: -2.0
      decel_lim_y: 0.0
      decel_lim_theta: -3.0
      # DWB critics（評価関数の重み）
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0

# ===== Planner Server (Global Planner) =====
# 地図全体を見て最短経路を計算
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5                  # ゴール到達許容誤差 [m]
      use_astar: false                # true=A*, false=Dijkstra
      allow_unknown: true             # 未探索領域の通過を許可

# ===== Behavior Server (Humble では recoveries_server → behavior_server) =====
# スタック時の自動復帰行動
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

# ===== Global Costmap =====
# 地図全体のコスト（通行コスト）マップ
# Global Planner がこれを使って経路計画する
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0           # 更新頻度 [Hz]（全体地図なので低めでOK）
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.18              # ロボットの半径 [m]（body_width/2 + margin）
      resolution: 0.05                # SLAM と同じ解像度
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static Layer: SLAM で作った静的地図を読み込む
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # Obstacle Layer: リアルタイムセンサーデータから動的障害物を検出
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true               # 障害物がなくなったらコストをクリア
          marking: true                # 障害物を検出したらコストを設定
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0

      # Inflation Layer: 障害物周辺に安全マージン（バッファ）を設定
      # FW でいうとデバウンス/ヒステリシスに相当
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0       # コスト減衰の速さ（大きい=急激に減衰）
        inflation_radius: 0.55         # 膨張半径 [m]（ロボット半径 + 安全マージン）

# ===== Local Costmap =====
# ロボット周辺のコストマップ（リアルタイム障害物回避用）
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0           # 高頻度更新（リアルタイム回避のため）
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.18
      resolution: 0.05
      rolling_window: true            # ロボット中心に動く窓
      width: 3                        # ローカルマップサイズ [m]
      height: 3
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
